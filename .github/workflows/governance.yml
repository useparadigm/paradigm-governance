name: Governance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Governance
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4

      - name: Run governance check
        id: governance
        run: |
          set +e
          uv run governance-ci-report --config governance.toml --json --advise > /tmp/report.json 2>/tmp/advice-log.txt
          exit_code=$?
          set -e

          cat /tmp/advice-log.txt >&2

          passed=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print('true' if d['passed'] else 'false')" 2>/dev/null || echo "false")
          violations=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(len(d['violations']))" 2>/dev/null || echo "0")
          new_modules=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(len(d['new_modules']))" 2>/dev/null || echo "0")
          markdown=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); print(d['markdown'])" 2>/dev/null || echo "Governance check failed.")
          updated_config=$(python3 -c "import json; d=json.load(open('/tmp/report.json')); c=d.get('updated_config'); print(c if c else '')" 2>/dev/null || echo "")

          echo "passed=$passed" >> $GITHUB_OUTPUT
          echo "violations=$violations" >> $GITHUB_OUTPUT
          echo "new_modules=$new_modules" >> $GITHUB_OUTPUT
          echo "$markdown" > /tmp/governance-comment.md

          if [ -n "$updated_config" ]; then
            echo "$updated_config" > /tmp/governance-updated-config.toml
          fi

          echo "$markdown"

      - name: Create fix PR
        id: fix-pr
        if: github.event_name == 'pull_request' && steps.governance.outputs.new_modules != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/governance-updated-config.toml ]; then
            exit 0
          fi

          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_BRANCH=${{ github.head_ref }}
          FIX_BRANCH="governance/fix-config-${PR_NUMBER}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code origin "refs/heads/${FIX_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${FIX_BRANCH}"
            git checkout "${FIX_BRANCH}"
            git reset --hard "origin/${PR_BRANCH}"
          else
            git checkout -b "${FIX_BRANCH}"
          fi

          cp /tmp/governance-updated-config.toml governance.toml
          uv run governance-ast --fix-deps || true

          git add governance.toml
          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "governance: add new modules to config"
          git push origin "${FIX_BRANCH}" --force

          EXISTING_PR=$(gh pr list --head "${FIX_BRANCH}" --base "${PR_BRANCH}" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING_PR" ]; then
            PR_URL=$(gh pr view "${EXISTING_PR}" --json url --jq '.url')
          else
            PR_URL=$(gh pr create \
              --head "${FIX_BRANCH}" \
              --base "${PR_BRANCH}" \
              --title "governance: update config for new modules" \
              --body "Auto-generated by paradigm-governance. Merge into your branch to fix the governance check.")
          fi

          echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FIX_PR_URL="${{ steps.fix-pr.outputs.pr_url }}"
          if [ -n "$FIX_PR_URL" ]; then
            echo "" >> /tmp/governance-comment.md
            echo "🔧 **Config fix ready:** ${FIX_PR_URL}" >> /tmp/governance-comment.md
          fi

          comment_id=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | test("^## [✅❌] Governance")) | .id' 2>/dev/null | head -1)
          if [ -n "$comment_id" ]; then
            gh api repos/${{ github.repository }}/issues/comments/$comment_id -X DELETE 2>/dev/null || true
          fi

          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/governance-comment.md

      - name: Fail if violations
        if: steps.governance.outputs.passed == 'false'
        run: exit 1
