name: "Paradigm Governance"
description: "Enforce module boundaries and architecture rules in Python codebases"
branding:
  icon: "shield"
  color: "blue"

inputs:
  config:
    description: "Path to governance.toml"
    required: false
    default: "governance.toml"
  diff:
    description: "Only check files changed since this git ref (e.g. origin/main, HEAD~1)"
    required: false
    default: ""
  baseline:
    description: "Path to baseline JSON file — only report new violations"
    required: false
    default: ""
  comment:
    description: "Post a PR comment with the governance report"
    required: false
    default: "true"
  advise:
    description: "Use LLM to generate architectural advice (requires ANTHROPIC_API_KEY or OPENAI_API_KEY)"
    required: false
    default: "false"
  version:
    description: "paradigm-governance version to install"
    required: false
    default: ""
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"

outputs:
  passed:
    description: "Whether governance checks passed (true/false)"
    value: ${{ steps.report.outputs.passed }}
  violations:
    description: "Number of violations found"
    value: ${{ steps.report.outputs.violations }}
  new-modules:
    description: "Number of new modules detected"
    value: ${{ steps.report.outputs.new_modules }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install paradigm-governance
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "paradigm-governance==${{ inputs.version }}"
        else
          pip install paradigm-governance
        fi

    - name: Run governance report
      id: report
      shell: bash
      run: |
        ADVISE_FLAG=""
        if [ "${{ inputs.advise }}" = "true" ]; then
          ADVISE_FLAG="--advise"
        fi

        set +e
        output=$(governance-ci-report --config "${{ inputs.config }}" --json $ADVISE_FLAG 2>&1)
        exit_code=$?
        set -e

        passed=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d['passed'] else 'false')" 2>/dev/null || echo "false")
        violations=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['violations']))" 2>/dev/null || echo "0")
        new_modules=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['new_modules']))" 2>/dev/null || echo "0")
        markdown=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['markdown'])" 2>/dev/null || echo "Governance check failed.")

        echo "passed=$passed" >> $GITHUB_OUTPUT
        echo "violations=$violations" >> $GITHUB_OUTPUT
        echo "new_modules=$new_modules" >> $GITHUB_OUTPUT

        echo "$markdown" > /tmp/governance-report.md
        echo "$markdown"

    - name: Comment on PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        comment_id=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          --jq '.[] | select(.body | test("^## [✅❌] Governance")) | .id' 2>/dev/null | head -1)
        if [ -n "$comment_id" ]; then
          gh api repos/${{ github.repository }}/issues/comments/$comment_id -X DELETE 2>/dev/null || true
        fi

        gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/governance-report.md

    - name: Fail if violations
      if: steps.report.outputs.passed == 'false'
      shell: bash
      run: exit 1
