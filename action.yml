name: "Paradigm Governance"
description: "Enforce module boundaries and architecture rules in Python codebases"
branding:
  icon: "shield"
  color: "blue"

inputs:
  config:
    description: "Path to governance.toml"
    required: false
    default: "governance.toml"
  diff:
    description: "Only check files changed since this git ref (e.g. origin/main, HEAD~1)"
    required: false
    default: ""
  baseline:
    description: "Path to baseline JSON file — only report new violations"
    required: false
    default: ""
  suggest-fix:
    description: "Create a fix PR with updated governance.toml when new modules are detected"
    required: false
    default: "true"
  comment:
    description: "Post a PR comment with the governance report"
    required: false
    default: "true"
  advise:
    description: "Use LLM to generate architectural advice (requires ANTHROPIC_API_KEY or OPENAI_API_KEY)"
    required: false
    default: "false"
  version:
    description: "paradigm-governance version to install"
    required: false
    default: ""
  python-version:
    description: "Python version to use"
    required: false
    default: "3.12"

outputs:
  passed:
    description: "Whether governance checks passed (true/false)"
    value: ${{ steps.report.outputs.passed }}
  violations:
    description: "Number of violations found"
    value: ${{ steps.report.outputs.violations }}
  new-modules:
    description: "Number of new modules detected"
    value: ${{ steps.report.outputs.new_modules }}
  fix-pr:
    description: "URL of the fix PR (if created)"
    value: ${{ steps.fix-pr.outputs.pr_url }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install paradigm-governance
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "paradigm-governance==${{ inputs.version }}"
        else
          pip install paradigm-governance
        fi

    - name: Run governance report
      id: report
      shell: bash
      run: |
        ADVISE_FLAG=""
        if [ "${{ inputs.advise }}" = "true" ]; then
          ADVISE_FLAG="--advise"
        fi

        set +e
        output=$(governance-ci-report --config "${{ inputs.config }}" --json $ADVISE_FLAG 2>&1)
        exit_code=$?
        set -e

        passed=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print('true' if d['passed'] else 'false')" 2>/dev/null || echo "false")
        violations=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['violations']))" 2>/dev/null || echo "0")
        new_modules=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d['new_modules']))" 2>/dev/null || echo "0")
        markdown=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['markdown'])" 2>/dev/null || echo "Governance check failed.")
        updated_config=$(echo "$output" | python3 -c "import sys,json; d=json.load(sys.stdin); c=d.get('updated_config'); print(c if c else '')" 2>/dev/null || echo "")

        echo "passed=$passed" >> $GITHUB_OUTPUT
        echo "violations=$violations" >> $GITHUB_OUTPUT
        echo "new_modules=$new_modules" >> $GITHUB_OUTPUT

        echo "$markdown" > /tmp/governance-report.md

        if [ -n "$updated_config" ]; then
          echo "$updated_config" > /tmp/governance-updated-config.toml
        fi

        echo "$markdown"

    - name: Create fix PR
      id: fix-pr
      if: inputs.suggest-fix == 'true' && steps.report.outputs.new_modules != '0' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if [ ! -f /tmp/governance-updated-config.toml ]; then
          echo "No config update to suggest"
          exit 0
        fi

        PR_NUMBER=${{ github.event.pull_request.number }}
        PR_BRANCH=${{ github.head_ref }}
        FIX_BRANCH="governance/fix-config-${PR_NUMBER}"

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # Check if fix branch already exists (re-run case)
        if git ls-remote --exit-code origin "refs/heads/${FIX_BRANCH}" >/dev/null 2>&1; then
          echo "Fix branch exists — updating"
          git fetch origin "${FIX_BRANCH}"
          git checkout "${FIX_BRANCH}"
          git reset --hard "origin/${PR_BRANCH}"
        else
          echo "Creating fix branch"
          git checkout -b "${FIX_BRANCH}"
        fi

        cp /tmp/governance-updated-config.toml "${{ inputs.config }}"
        governance-ast --config "${{ inputs.config }}" --fix-deps || true

        git add "${{ inputs.config }}"
        if git diff --cached --quiet; then
          echo "No config changes needed"
          exit 0
        fi

        git commit -m "governance: add new modules to config

        Auto-detected by paradigm-governance. Run governance-ast --fix-deps to update."
        git push origin "${FIX_BRANCH}" --force

        # Create or update the fix PR
        EXISTING_PR=$(gh pr list --head "${FIX_BRANCH}" --base "${PR_BRANCH}" --json number --jq '.[0].number' 2>/dev/null || echo "")

        if [ -n "$EXISTING_PR" ]; then
          echo "Fix PR #${EXISTING_PR} already exists — updated branch"
          PR_URL=$(gh pr view "${EXISTING_PR}" --json url --jq '.url')
        else
          PR_URL=$(gh pr create \
            --head "${FIX_BRANCH}" \
            --base "${PR_BRANCH}" \
            --title "governance: update config for new modules" \
            --body "$(cat <<'BODY'
        Auto-generated by paradigm-governance.

        New modules were detected that aren't in \`governance.toml\`. This PR adds them with \`depends_on\` populated from actual imports.

        Merge this into your branch to fix the governance check.
        BODY
          )")
        fi

        echo "pr_url=${PR_URL}" >> $GITHUB_OUTPUT

    - name: Comment on PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Append fix PR link if one was created
        FIX_PR_URL="${{ steps.fix-pr.outputs.pr_url }}"
        if [ -n "$FIX_PR_URL" ]; then
          echo "" >> /tmp/governance-report.md
          echo "🔧 **Config fix ready:** ${FIX_PR_URL}" >> /tmp/governance-report.md
        fi

        # Delete previous governance comment (match both header styles)
        comment_id=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          --jq '.[] | select(.body | test("^## [✅❌] Governance")) | .id' 2>/dev/null | head -1)
        if [ -n "$comment_id" ]; then
          gh api repos/${{ github.repository }}/issues/comments/$comment_id -X DELETE 2>/dev/null || true
        fi

        gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/governance-report.md

    - name: Fail if violations
      if: steps.report.outputs.passed == 'false'
      shell: bash
      run: exit 1
