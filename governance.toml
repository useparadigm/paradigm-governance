[governance]
root = "paradigm_governance"
language = "python"

[[modules]]
name = "core"
path = "."
depends_on = ["advisor", "languages"]
layer = "engine"

[[modules]]
name = "languages"
path = "languages/"
depends_on = ["core"]
layer = "languages"

[[modules]]
name = "advisor"
path = "advisor/"
depends_on = ["core"]
layer = "advisor"

[[modules]]
name = "viewer"
path = "viewer/"
depends_on = []
layer = "viewer"

[[modules]]
name = "exporters"
path = "exporters/"
depends_on = ["core"]

[layers]
order = []

[rules]
no_cycles = true
enforce_layers = false
enforce_depends_on = true
exclude_test_files = true
exclude_from_cycles = ["core", "languages"]

