[governance]
root = "code_governance"
language = "python"

[[modules]]
name = "core"
path = "."
cannot_depend_on = []
layer = "engine"

[[modules]]
name = "languages"
path = "languages/"
cannot_depend_on = []
layer = "languages"

[[modules]]
name = "advisor"
path = "advisor/"
cannot_depend_on = []
layer = "advisor"

[[modules]]
name = "viewer"
path = "viewer/"
cannot_depend_on = []
layer = "viewer"

[layers]
order = []

[rules]
no_cycles = true
enforce_layers = false
enforce_cannot_depend_on = true
exclude_test_files = true
exclude_from_cycles = ["core", "languages"]
