[governance]
root = "."
language = "python"

[[modules]]
name = "core"
path = "core/"
depends_on = []
layer = "core"

[[modules]]
name = "db"
path = "db/"
depends_on = ["core"]
layer = "db"

[[modules]]
name = "api"
path = "api/"
depends_on = ["core", "db", "utils"]
layer = "api"

[[modules]]
name = "utils"
path = "utils/"
depends_on = []
layer = "utils"

[layers]
order = ["api", "db", "core", "utils"]

[rules]
no_cycles = true
enforce_layers = true
enforce_depends_on = true
exclude_test_files = true
