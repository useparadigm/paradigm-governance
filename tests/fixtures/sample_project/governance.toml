[governance]
root = "."
language = "python"

[[modules]]
name = "core"
path = "core/"
cannot_depend_on = ["db"]
layer = "core"

[[modules]]
name = "db"
path = "db/"
cannot_depend_on = []
layer = "db"

[[modules]]
name = "api"
path = "api/"
cannot_depend_on = []
layer = "api"

[[modules]]
name = "utils"
path = "utils/"
cannot_depend_on = []
layer = "utils"

[layers]
order = ["api", "db", "core", "utils"]

[rules]
no_cycles = true
enforce_layers = true
enforce_cannot_depend_on = true
exclude_test_files = true
